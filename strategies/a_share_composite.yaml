# A-Share Composite Strategy / A股复合策略
# 基于 2026 年 A 股结构性分化行情调研设计：市场环境定仓位上限、主线板块定方向、
# 哑铃结构（进攻+防守）定个股打法、A 股制度特性（T+1、涨跌停、短期反转）定风控纪律。

name: a_share_composite
display_name: A股复合策略
description: 针对A股结构市的四层复合策略：先判市场环境定仓位，再看主线板块定方向，个股按"趋势主线/题材情绪/红利防守"哑铃分派打法，最后用A股特色风控纪律收口。
category: framework
core_rules: [1, 2, 3, 5, 6, 7]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news
  - get_stock_info
aliases: [A股复合, 复合策略, 哑铃策略, 结构市策略]
default_priority: 15

instructions: |
  **A股复合策略（A-Share Composite Strategy）**

  设计前提：A股是典型的"结构市"——指数涨幅温和，个股极端分化（例如 2026 年上半年
  上证指数仅涨 2.65%，但近七成个股下跌，同时翻倍股超过 360 只）。因此本策略的
  第一原则是：**先定环境，再定板块，最后才是个股**。环境和板块不支持时，
  个股技术面再好也只能给"观望"。

  ## 第一层：市场环境判断（决定评分上限与仓位水位）

  优先利用上下文中已提供的大盘/市场阶段信息（若有大盘复盘、市场情绪、指数数据）。
  将市场环境归入三档，并对最终 sentiment_score 设定**硬上限**：

  1. **趋势市**（指数站上关键均线、量能持续放大、赚钱效应扩散）：
     - 评分不设额外上限，可给出积极建议，建议单票仓位上限 2~3 成。
  2. **结构市 / 震荡市**（指数横盘、板块轮动快、少数主线赚钱）：
     - sentiment_score 上限 75；只对"主线板块内"的个股给买入建议，
       非主线个股最高只给"观望"。建议单票仓位上限 1~2 成。
  3. **退潮市 / 弱市**（指数破位、跌多涨少、亏钱效应明显）：
     - sentiment_score 上限 55；除红利防守型标的外一律"观望"或"减仓"，
       并在建议中明确"以防守为主、降低总仓位"。

  若上下文中没有任何大盘信息，默认按"结构市"处理，并在
  data_limitations 中说明"未获得大盘环境数据，按结构市保守假设"。

  ## 第二层：主线板块与相对强度（结构市的生死线）

  使用 `get_sector_rankings` 与 `get_realtime_quote`：

  1. **主线判定**：该股所属板块是否处于近期涨幅榜前列？主线板块应满足
     "持续多日上榜 + 板块内多股联动"，单日冲高不算主线。
  2. **个股相对强度（RS）**：对比个股近 20 日涨跌幅与板块及大盘：
     - 强于板块且强于大盘 → 主线内强势股，优先级最高；
     - 弱于板块 → 跟风股，即使板块是主线也要降级处理。
  3. **扩散度警示**：当主线板块内"高位股补跌、低位股补涨"（炒作扩散到边缘股）时，
     提示主线可能进入尾声，收紧买入建议。

  ## 第三层：个股打法分派（哑铃结构，三选一）

  根据个股特征将其归入以下三种打法之一，按对应标准评估。
  归类依据：用 `get_stock_info`、`analyze_trend`、`get_daily_history` 判断
  个股属于趋势股、题材股还是防守股。

  ### 打法 A：趋势主线股（进攻腿，首选）
  适用：主线板块内、均线多头排列（MA5>MA10>MA20）的个股。
  - 买点：缩量回踩 MA5/MA10 不破，或放量突破前高且乖离率 < 5%；
  - 板块龙头（相对强度第一梯队）可放宽乖离率至 7%，但必须注明"龙头放宽"；
  - 量价：突破日量能应明显放大；缩量新高警惕背离。

  ### 打法 B：题材情绪股（进攻腿，严格限制）
  适用：热点题材内、换手率高（>5%）、有明确事件催化的个股。
  - 必须用 `search_stock_news` 确认催化真实存在（政策、订单、业绩、产业事件），
    无法确认催化的高换手股一律按"游资炒作"处理，只给观望；
  - 只在题材情绪上升期参与（板块连续上榜、联动加强）；情绪退潮期
    （高位股大面积回落、板块涨幅榜换血）坚决不追；
  - 此类建议 confidence_level 最高只给"中"，并明确标注"短线题材、快进快出、
    严格止损"。

  ### 打法 C：红利防守股（防守腿）
  适用：高股息、低波动、业绩稳定的个股（银行、公用事业、资源分红类等）。
  - 弱市/退潮市中是唯一可给"买入/持有"倾向的类型；
  - 买点：回调至长期均线附近、股息率处于自身历史偏高区间；
  - 破位纪律：跌破 MA60 或出现基本面恶化（分红缩水、业绩转差）即建议退出。

  ## 第四层：A股特色风控纪律（一票否决与降级）

  1. **风险一票否决**（任一命中，最终建议不得高于"观望"，并列入风险提示）：
     - 减持公告、大额解禁临近、业绩预亏/爆雷、立案调查、监管处罚、
       退市风险警示（ST/*ST）、高商誉减值风险。
     - 用 `search_stock_news` 主动排查上述利空。
  2. **短期反转降级**（A股短期动量呈显著反转效应）：
     - 近 5 日累计涨幅 > 25%，或连续涨停后打开：追高买入建议自动降一档，
       并提示"A股短线超涨易反转，等回踩确认"。
  3. **流动性底线**：日成交额过低（明显缩量、无人问津）的个股不给买入建议，
     避免建议无法成交或冲击成本过高。
  4. **输出纪律**：凡给出"买入"倾向，必须同时给出：
     - 具体入场区间（entry）、止损位（结构低点或关键均线下方）、目标位；
     - T+1 提示：当日买入无法当日卖出，入场前确认止损空间可承受。

  ## 评分调整建议

  - 市场环境为趋势市且个股属主线强势股：sentiment_score +12
  - 结构市中确认为主线板块 + 相对强度强：sentiment_score +8
  - 打法 A 标准买点出现（缩量回踩不破 / 放量突破且乖离可控）：sentiment_score +10
  - 打法 B 催化确认且情绪上升期：sentiment_score +6（confidence 最高"中"）
  - 打法 C 弱市中防守配置达标：sentiment_score +5
  - 非主线板块个股（结构市/退潮市）：sentiment_score -10
  - 情绪退潮期的题材股：sentiment_score -15
  - 触发短期反转降级：sentiment_score -8
  - 触发风险一票否决：直接限制为"观望"及以下

  在 `buy_reason` 中注明："A股复合策略：{市场环境判断}｜{主线判断}｜{打法A/B/C}"，
  便于后续对不同环境和打法的建议做后验评估。
